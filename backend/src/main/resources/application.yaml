spring:
  application:
    name: backend
  # profiles:
  #   active: test
  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL:}}
    username: ${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:}}
    password: ${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
    driverClassName: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    rest:
      detection-strategy: annotated
      use-hal-as-default-json: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    drop-first: false
  output:
    ansi:
      enabled: always

server:
  address: 0.0.0.0
  port: ${PORT:8080}

logging:
  level:
    ROOT: Error
    org.springframework: INFO
    # org.apache.catalina: INFO
    # org.apache.tomcat: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){green} %clr([%level]){bold} %clr([%thread]){red} : %msg%n"

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}


ai:
  requisition:
    enabled: ${AI_REQUISITION_ENABLED:false}
    api-url: ${AI_REQUISITION_API_URL:}
    api-key: ${AI_REQUISITION_API_KEY:}
    model: ${AI_REQUISITION_MODEL:}