databaseChangeLog:
  - changeSet:
      id: 008-ensure-super-admin-user
      author: copilot
      changes:
        - update:
            tableName: users
            columns:
              - column:
                  name: full_name
                  value: JUST Super Admin
              - column:
                  name: password
                  value: $2a$10$hTtpS2P0OwNYkFqyLxVkDucNZ9SU7XhDiIUrevkJ6pa3awzf0P/Di
              - column:
                  name: email
                  value: super.admin@university.edu
              - column:
                  name: role_id
                  value: 2
              - column:
                  name: office_id
                  value: 2
            where: username = 'super.admin'

  - changeSet:
      id: 008-insert-super-admin-user-if-missing
      author: copilot
      preConditions:
        onFail: MARK_RAN
        not:
          sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM users WHERE username = 'super.admin'
      changes:
        - insert:
            tableName: users
            columns:
              - column:
                  name: full_name
                  value: JUST Super Admin
              - column:
                  name: username
                  value: super.admin
              - column:
                  name: password
                  value: $2a$10$hTtpS2P0OwNYkFqyLxVkDucNZ9SU7XhDiIUrevkJ6pa3awzf0P/Di
              - column:
                  name: email
                  value: super.admin@university.edu
              - column:
                  name: role_id
                  value: 2
              - column:
                  name: office_id
                  value: 2